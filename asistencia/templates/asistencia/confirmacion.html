<!DOCTYPE html>
<html lang="es">
<head>

    <title>Asistencia Registrada</title>

            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ecfdf5;

            padding: 24px;

        }
        .container {
            max-width: 640px;

        <h1>Registro exitoso</h1>
